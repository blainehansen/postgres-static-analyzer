ty = "Option<PgConstraintConfmatchtype>"
exp = "pg_constraint.confmatchtype.map(PgConstraintConfmatchtype::pg_from_char)"
pgEnum = "'f' => Full, 'p' => Partial, 's' => Simple"

[pg_constraint.columns.conislocal]
