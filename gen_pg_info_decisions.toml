[pg_constraint.columns.conppeqop]
typ = "oid[]"
ref = "(references pg_operator.oid)"
desc = "If a foreign key, list of the equality operators for PK = PK comparisons"
sel = "pg_constraint.conppeqop::regoperator[]::text[]"
ty = "Option<Vec<Qual>>"
exp = "pg_constraint.conppeqop.map(|items| items.map(Qual::parse).collect())"

[pg_constraint.columns.conffeqop]
typ = "oid[]"
ref = "(references pg_operator.oid)"
desc = "If a foreign key, list of the equality operators for FK = FK comparisons"
sel = "pg_constraint.conffeqop::regoperator[]::text[]"
ty = "Option<Vec<Qual>>"
exp = "pg_constraint.conffeqop.map(|items| items.map(Qual::parse).collect())"

[pg_constraint.columns.confdelsetcols]
