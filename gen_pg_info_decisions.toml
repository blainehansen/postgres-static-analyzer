ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_attribute.atttypid)"

[pg_attribute.columns.attlen]
typ = "int2"
ref = ""
desc = "A copy of pg_type.typlen of this column's type"
skip = true

[pg_attribute.columns.attnum]
