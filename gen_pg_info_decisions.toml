typ = "int2"
ref = ""
desc = "For a fixed-size type, typlen is the number of bytes in the internal representation of the type. But for a variable-length type, typlen is negative. -1 indicates a “varlena” type (one that has a length word), -2 indicates a null-terminated C string."
ty = "i16"

[pg_type.columns.typbyval]
typ = "bool"
ref = ""
desc = "typbyval determines whether internal routines pass a value of this type by value or by reference. typbyval had better be false if typlen is not 1, 2, or 4 (or 8 on machines where Datum is 8 bytes). Variable-length types are always passed by reference. Note that typbyval can be false even if the length would allow pass-by-value."
ty = "bool"

[pg_type.columns.typtype]
typ = "char"
ref = ""
desc = "typtype is b for a base type, c for a composite type (e.g., a table's row type), d for a domain, e for an enum type, p for a pseudo-type, r for a range type, or m for a multirange type. See also typrelid and typbasetype."
ty = "PgTypeTyptype"
exp = "PgTypeTyptype::pg_from_char(pg_type.typtype)"
pgEnum = "'b' => Base, 'c' => Composite, 'd' => Domain, 'e' => Enum, 'p' => Pseudo, 'r' => Range, 'm' => Multirange"

[pg_type.columns.typcategory]
typ = "char"
ref = ""
desc = "typcategory is an arbitrary classification of data types that is used by the parser to determine which implicit casts should be “preferred”. See Table 51.65."
skip = true

[pg_type.columns.typispreferred]
typ = "bool"
ref = ""
desc = "True if the type is a preferred cast target within its typcategory"
ty = "bool"

[pg_type.columns.typisdefined]
typ = "bool"
ref = ""
desc = "True if the type is defined, false if this is a placeholder entry for a not-yet-defined type. When typisdefined is false, nothing except the type name, namespace, and OID can be relied on."
ty = "bool"

[pg_type.columns.typdelim]
typ = "char"
ref = ""
desc = "Character that separates two values of this type when parsing array input. Note that the delimiter is associated with the array element data type, not the array data type."
ty = "i8"

[pg_type.columns.typrelid]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "If this is a composite type (see typtype), then this column points to the pg_class entry that defines the corresponding table. (For a free-standing composite type, the pg_class entry doesn't really represent a table, but it is needed anyway for the type's pg_attribute entries to link to.) Zero for non-composite types."
sel = "case when pg_type.typrelid = 0 then null else pg_type.typrelid::regclass::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typrelid)"

[pg_type.columns.typsubscript]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Subscripting handler function's OID, or zero if this type doesn't support subscripting. Types that are “true” array types have typsubscript = array_subscript_handler, but other types may have other handler functions to implement specialized subscripting behavior."
sel = "case when typsubscript = 0 then null else typsubscript::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typsubscript)"

[pg_type.columns.typelem]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "If typelem is not zero then it identifies another row in pg_type, defining the type yielded by subscripting. This should be zero if typsubscript is zero. However, it can be zero when typsubscript isn't zero, if the handler doesn't need typelem to determine the subscripting result type. Note that a typelem dependency is considered to imply physical containment of the element type in this type; so DDL changes on the element type might be restricted by the presence of this type."
sel = "case when pg_type.typelem = 0 then null else pg_type.typelem::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typelem)"

[pg_type.columns.typarray]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "If typarray is not zero then it identifies another row in pg_type, which is the “true” array type having this type as element"
sel = "case when pg_type.typarray = 0 then null else pg_type.typarray::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typarray)"

[pg_type.columns.typinput]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Input conversion function (text format)"
sel = "typinput::regproc::text"
ty = "Qual"
exp = "Qual::parse(pg_type.typinput)"

[pg_type.columns.typoutput]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Output conversion function (text format)"
sel = "typoutput::regproc::text"
ty = "Qual"
exp = "Qual::parse(pg_type.typoutput)"

[pg_type.columns.typreceive]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Input conversion function (binary format), or zero if none"
sel = "case when typreceive = 0 then null else typreceive::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typreceive)"

[pg_type.columns.typsend]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Output conversion function (binary format), or zero if none"
sel = "case when typsend = 0 then null else typsend::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typsend)"

[pg_type.columns.typmodin]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Type modifier input function, or zero if type does not support modifiers"
sel = "case when typmodin = 0 then null else typmodin::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typmodin)"

[pg_type.columns.typmodout]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Type modifier output function, or zero to use the standard format"
sel = "case when typmodout = 0 then null else typmodout::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typmodout)"

[pg_type.columns.typanalyze]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Custom ANALYZE function, or zero to use the standard function"
sel = "case when typanalyze = 0 then null else typanalyze::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typanalyze)"

[pg_type.columns.typalign]
typ = "char"
ref = ""
desc = "typalign is the alignment required when storing a value of this type. It applies to storage on disk as well as most representations of the value inside PostgreSQL. When multiple values are stored consecutively, such as in the representation of a complete row on disk, padding is inserted before a datum of this type so that it begins on the specified boundary. The alignment reference is the beginning of the first datum in the sequence. Possible values are: c = char alignment, i.e., no alignment needed. s = short alignment (2 bytes on most machines). i = int alignment (4 bytes on most machines). d = double alignment (8 bytes on many machines, but by no means all)."
ty = "PgTypeTypalign"
exp = "PgTypeTypalign::pg_from_char(pg_type.typalign)"
pgEnum = "'c' => Char, 's' => Short, 'i' => Int, 'd' => Double"

[pg_type.columns.typstorage]
typ = "char"
ref = ""
desc = "typstorage tells for varlena types (those with typlen = -1) if the type is prepared for toasting and what the default strategy for attributes of this type should be. Possible values are: p (plain): Values must always be stored plain (non-varlena types always use this value). e (external): Values can be stored in a secondary “TOAST” relation (if relation has one, see pg_class.reltoastrelid). m (main): Values can be compressed and stored inline. x (extended): Values can be compressed and/or moved to a secondary relation. x is the usual choice for toast-able types. Note that m values can also be moved out to secondary storage, but only as a last resort (e and x values are moved first)."
ty = "PgTypeTypstorage"
exp = "PgTypeTypstorage::pg_from_char(pg_type.typstorage)"
pgEnum = "'p' => Plain, 'e' => External, 'm' => Main, 'x' => Extended"

[pg_type.columns.typnotnull]
typ = "bool"
ref = ""
desc = "typnotnull represents a not-null constraint on a type. Used for domains only."
ty = "bool"

[pg_type.columns.typbasetype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "If this is a domain (see typtype), then typbasetype identifies the type that this one is based on. Zero if this type is not a domain."
sel = "case when pg_type.typbasetype = 0 then null else pg_type.typbasetype::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typbasetype)"

[pg_type.columns.typtypmod]
typ = "int4"
ref = ""
desc = "Domains use typtypmod to record the typmod to be applied to their base type (-1 if base type does not use a typmod). -1 if this type is not a domain."
sel = "case when typtypmod < 0 then null else typtypmod end"
ty = "Option<u32>"
exp = "pg_type.typtypmod.map(i32::unsigned_abs)"

[pg_type.columns.typndims]
typ = "int4"
ref = ""
desc = "typndims is the number of array dimensions for a domain over an array (that is, typbasetype is an array type). Zero for types other than domains over array types."
ty = "u32"
exp = "pg_type.typndims.unsigned_abs()"

[pg_type.columns.typcollation]
typ = "oid"
ref = "(references pg_collation.oid)"
desc = "typcollation specifies the collation of the type. If the type does not support collations, this will be zero. A base type that supports collations will have a nonzero value here, typically DEFAULT_COLLATION_OID. A domain over a collatable type can have a collation OID different from its base type's, if one was specified for the domain."
sel = "case when pg_type.typcollation = 0 then null else pg_type.typcollation::regcollation::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_type.typcollation)"

[pg_type.columns.typdefaultbin]
typ = "pg_node_tree"
ref = ""
desc = "If typdefaultbin is not null, it is the nodeToString() representation of a default expression for the type. This is only used for domains."
sel = "pg_get_expr(typdefaultbin, 0)"
ty = "Option<Str>"
exp = "pg_type.typdefaultbin.map(Into::into)"

[pg_type.columns.typdefault]
typ = "text"
ref = ""
desc = "typdefault is null if the type has no associated default value. If typdefaultbin is not null, typdefault must contain a human-readable version of the default expression represented by typdefaultbin. If typdefaultbin is null and typdefault is not, then typdefault is the external representation of the type's default value, which can be fed to the type's input converter to produce a constant."
ty = "Option<Str>"
exp = "pg_type.typdefault.map(Into::into)"

[pg_type.columns.typacl]
typ = "aclitem[]"
ref = ""
desc = "Access privileges; see Section 5.8 for details"
sel = "typacl::text[]"
ty = "Option<Vec<aclitem::TypeAclItem>>"
exp = "pg_type.typacl.map(|typacl| typacl.map(|acl| aclitem(acl, &TypeGrantParser)).collect())"
