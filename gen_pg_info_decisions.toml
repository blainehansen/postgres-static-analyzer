
[pg_aggregate.columns.aggfnoid]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "pg_proc OID of the aggregate function"
sel = "aggfnoid::regproc::text"
ty = "Qual"
exp = "Qual::parse(pg_aggregate.aggfnoid)"

[pg_aggregate.columns.aggkind]
typ = "char"
ref = ""
desc = "Aggregate kind: n for “normal” aggregates, o for “ordered-set” aggregates, or h for “hypothetical-set” aggregates"
ty = "PgAggregateAggkind"
exp = "PgAggregateAggkind::pg_from_char(pg_aggregate.aggkind)"
pgEnum = "'n' => Normal, 'o' => OrderedSet, 'h' => HypotheticalSet"

[pg_aggregate.columns.aggnumdirectargs]
typ = "int2"
ref = ""
desc = "Number of direct (non-aggregated) arguments of an ordered-set or hypothetical-set aggregate, counting a variadic array as one argument. If equal to pronargs, the aggregate must be variadic and the variadic array describes the aggregated arguments as well as the final direct arguments. Always zero for normal aggregates."
ty = "u16"
exp = "pg_aggregate.aggnumdirectargs.unsigned_abs()"

[pg_aggregate.columns.aggtransfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Transition function"
sel = "aggtransfn::regproc::text"
ty = "Qual"
exp = "Qual::parse(pg_aggregate.aggtransfn)"

[pg_aggregate.columns.aggfinalfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Final function (zero if none)"
sel = "case when aggfinalfn = 0 then null else aggfinalfn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggfinalfn)"

[pg_aggregate.columns.aggcombinefn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Combine function (zero if none)"
sel = "case when aggcombinefn = 0 then null else aggcombinefn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggcombinefn)"

[pg_aggregate.columns.aggserialfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Serialization function (zero if none)"
sel = "case when aggserialfn = 0 then null else aggserialfn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggserialfn)"

[pg_aggregate.columns.aggdeserialfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Deserialization function (zero if none)"
sel = "case when aggdeserialfn = 0 then null else aggdeserialfn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggdeserialfn)"

[pg_aggregate.columns.aggmtransfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Forward transition function for moving-aggregate mode (zero if none)"
sel = "case when aggmtransfn = 0 then null else aggmtransfn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggmtransfn)"

[pg_aggregate.columns.aggminvtransfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Inverse transition function for moving-aggregate mode (zero if none)"
sel = "case when aggminvtransfn = 0 then null else aggminvtransfn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggminvtransfn)"

[pg_aggregate.columns.aggmfinalfn]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "Final function for moving-aggregate mode (zero if none)"
sel = "case when aggmfinalfn = 0 then null else aggmfinalfn::regproc::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggmfinalfn)"

[pg_aggregate.columns.aggfinalextra]
typ = "bool"
ref = ""
desc = "True to pass extra dummy arguments to aggfinalfn"
ty = "bool"

[pg_aggregate.columns.aggmfinalextra]
typ = "bool"
ref = ""
desc = "True to pass extra dummy arguments to aggmfinalfn"
ty = "bool"

[pg_aggregate.columns.aggfinalmodify]
typ = "char"
ref = ""
desc = "Whether aggfinalfn modifies the transition state value: r if it is read-only, s if the aggtransfn cannot be applied after the aggfinalfn, or w if it writes on the value"
ty = "PgAggregateAggfinalmodify"
exp = "PgAggregateAggfinalmodify::pg_from_char(pg_aggregate.aggfinalmodify)"
pgEnum = "'r' => ReadOnly, 's' => CannotApply, 'w' => Writes"

[pg_aggregate.columns.aggmfinalmodify]
typ = "char"
ref = ""
desc = "Like aggfinalmodify, but for the aggmfinalfn"
ty = "PgAggregateAggmfinalmodify"
exp = "PgAggregateAggmfinalmodify::pg_from_char(pg_aggregate.aggmfinalmodify)"
pgEnum = "'r' => ReadOnly, 's' => CannotApply, 'w' => Writes"

[pg_aggregate.columns.aggsortop]
typ = "oid"
ref = "(references pg_operator.oid)"
desc = "Associated sort operator (zero if none)"
sel = "case when aggsortop = 0 then null else aggsortop::regoperator::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggsortop)"

[pg_aggregate.columns.aggtranstype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "Data type of the aggregate function's internal transition (state) data"
sel = "aggtranstype::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_aggregate.aggtranstype)"

[pg_aggregate.columns.aggtransspace]
typ = "int4"
ref = ""
desc = "Approximate average size (in bytes) of the transition state data, or zero to use a default estimate"
skip = true

[pg_aggregate.columns.aggmtranstype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "Data type of the aggregate function's internal transition (state) data for moving-aggregate mode (zero if none)"
sel = "case when aggmtranstype = 0 then null else aggmtranstype::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_aggregate.aggmtranstype)"

[pg_aggregate.columns.aggmtransspace]
typ = "int4"
ref = ""
desc = "Approximate average size (in bytes) of the transition state data for moving-aggregate mode, or zero to use a default estimate"
skip = true

[pg_aggregate.columns.agginitval]
typ = "text"
ref = ""
desc = "The initial value of the transition state. This is a text field containing the initial value in its external string representation. If this field is null, the transition state value starts out null."
ty = "Option<Str>"
exp = "pg_aggregate.agginitval.map(Into::into)"

[pg_aggregate.columns.aggminitval]
typ = "text"
ref = ""
desc = "The initial value of the transition state for moving-aggregate mode. This is a text field containing the initial value in its external string representation. If this field is null, the transition state value starts out null."
ty = "Option<Str>"
exp = "pg_aggregate.aggminitval.map(Into::into)"

[pg_am]
hashCol = "amname"

[pg_am.columns.oid]
typ = "oid"
ref = ""
desc = "Row identifier"
skip = true

[pg_am.columns.amname]
typ = "name"
ref = ""
desc = "Name of the access method"
sel = "amname::text"
ty = "Str"
exp = "pg_am.amname.into()"

[pg_am.columns.amhandler]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "OID of a handler function that is responsible for supplying information about the access method"
sel = "amhandler::regproc::text"
ty = "Qual"
exp = "Qual::parse(pg_am.amhandler)"

[pg_am.columns.amtype]
typ = "char"
ref = ""
desc = "t = table (including materialized views), i = index."
ty = "PgAmAmtype"
exp = "PgAmAmtype::pg_from_char(pg_am.amtype)"
pgEnum = "'t' => Table, 'i' => Index"

[pg_amop.columns.oid]
typ = "oid"
ref = ""
desc = "Row identifier"
skip = true

[pg_amop.columns.amopfamily]
typ = "oid"
ref = "(references pg_opfamily.oid)"
desc = "The operator family this entry is for"
sel = "quote_ident(amopfamily_pg_namespace.nspname) || '.' || quote_ident(amopfamily_pg_opfamily.opfname)"
ty = "Qual"
exp = "Qual::parse(pg_amop.amopfamily)"
joins = ["join pg_opfamily as amopfamily_pg_opfamily on pg_amop.amopfamily = amopfamily_pg_opfamily.oid","join pg_namespace as amopfamily_pg_namespace on amopfamily_pg_opfamily.opfnamespace = amopfamily_pg_namespace.oid"]

[pg_amop.columns.amoplefttype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "Left-hand input data type of operator"
sel = "amoplefttype::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_amop.amoplefttype)"

[pg_amop.columns.amoprighttype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "Right-hand input data type of operator"
sel = "amoprighttype::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_amop.amoprighttype)"

[pg_amop.columns.amopstrategy]
typ = "int2"
ref = ""
desc = "Operator strategy number"
ty = "u16"
exp = "pg_amop.amopstrategy.unsigned_abs()"

[pg_amop.columns.amoppurpose]
typ = "char"
ref = ""
desc = "Operator purpose, either s for search or o for ordering"
ty = "PgAmopAmoppurpose"
exp = "PgAmopAmoppurpose::pg_from_char(pg_amop.amoppurpose)"
pgEnum = "'s' => Search, 'o' => Ordering"

[pg_amop.columns.amopopr]
typ = "oid"
ref = "(references pg_operator.oid)"
desc = "OID of the operator"
sel = "amopopr::regoperator::text"
ty = "Qual"
exp = "Qual::parse(pg_amop.amopopr)"

[pg_amop.columns.amopmethod]
typ = "oid"
ref = "(references pg_am.oid)"
desc = "Index access method operator family is for"
sel = "amopmethod_pg_am.amname::text"
ty = "Str"
exp = "pg_amop.amopmethod.into()"
joins = ["join pg_am as amopmethod_pg_am on pg_amop.amopmethod = amopmethod_pg_am.oid"]

[pg_amop.columns.amopsortfamily]
typ = "oid"
ref = "(references pg_opfamily.oid)"
desc = "The B-tree operator family this entry sorts according to, if an ordering operator; zero if a search operator"
sel = "quote_ident(amopsortfamily_pg_namespace.nspname) || '.' || quote_ident(amopsortfamily_pg_opfamily.opfname)"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_amop.amopsortfamily)"
joins = ["left join pg_opfamily as amopsortfamily_pg_opfamily on pg_amop.amopsortfamily = amopsortfamily_pg_opfamily.oid","left join pg_namespace as amopsortfamily_pg_namespace on amopsortfamily_pg_opfamily.opfnamespace = amopsortfamily_pg_namespace.oid"]

[pg_amproc.columns.oid]
typ = "oid"
ref = ""
desc = "Row identifier"
skip = true

[pg_amproc.columns.amprocfamily]
typ = "oid"
ref = "(references pg_opfamily.oid)"
desc = "The operator family this entry is for"
sel = "quote_ident(amprocfamily_pg_namespace.nspname) || '.' || quote_ident(amprocfamily_pg_opfamily.opfname)"
ty = "Qual"
exp = "Qual::parse(pg_amproc.amprocfamily)"
joins = ["join pg_opfamily as amprocfamily_pg_opfamily on pg_amproc.amprocfamily = amprocfamily_pg_opfamily.oid","join pg_namespace as amprocfamily_pg_namespace on amprocfamily_pg_opfamily.opfnamespace = amprocfamily_pg_namespace.oid"]

[pg_amproc.columns.amproclefttype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "Left-hand input data type of associated operator"
sel = "amproclefttype::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_amproc.amproclefttype)"

[pg_amproc.columns.amprocrighttype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "Right-hand input data type of associated operator"
sel = "amprocrighttype::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_amproc.amprocrighttype)"

[pg_amproc.columns.amprocnum]
typ = "int2"
ref = ""
desc = "Support function number"
ty = "u16"
exp = "pg_amproc.amprocnum.unsigned_abs()"

[pg_amproc.columns.amproc]
typ = "regproc"
ref = "(references pg_proc.oid)"
desc = "OID of the function"
sel = "amproc::regproc::text"
ty = "Qual"
exp = "Qual::parse(pg_amproc.amproc)"

[pg_class]
hashCol = true

[pg_class.columns.oid]
typ = "oid"
ref = ""
desc = "Row identifier"
sel = "pg_class.oid::regclass::text"
ty = "Qual"
exp = "Qual::parse(pg_class.oid)"

[pg_class.columns.relname]
typ = "name"
ref = ""
desc = "Name of the table, index, view, etc."
sel = "relname::text"
ty = "Str"
exp = "pg_class.relname.into()"

[pg_class.columns.relnamespace]
typ = "oid"
ref = "(references pg_namespace.oid)"
desc = "The OID of the namespace that contains this relation"
sel = "relnamespace::regnamespace::text"
ty = "Str"
exp = "pg_class.relnamespace.into()"
filters = ["relnamespace::regnamespace != 'pg_toast'::regnamespace"]

[pg_class.columns.reltype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "The OID of the data type that corresponds to this table's row type, if any; zero for indexes, sequences, and toast tables, which have no pg_type entry"
sel = "case when reltype = 0 then null else reltype::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_class.reltype)"

[pg_class.columns.reloftype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "For typed tables, the OID of the underlying composite type; zero for all other relations"
sel = "case when reloftype = 0 then null else reloftype::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_class.reloftype)"

[pg_class.columns.relowner]
typ = "oid"
ref = "(references pg_authid.oid)"
desc = "Owner of the relation"
sel = "pg_get_userbyid(relowner)::text"
ty = "Str"
exp = "pg_class.relowner.into()"

[pg_class.columns.relam]
typ = "oid"
ref = "(references pg_am.oid)"
desc = "The access method used to access this table or index. Not meaningful if the relation is a sequence or has no on-disk file, except for partitioned tables, where, if set, it takes precedence over default_table_access_method when determining the access method to use for partitions created when one is not specified in the creation command."
sel = "relam_pg_am.amname::text"
ty = "Option<Str>"
exp = "pg_class.relam.map(Into::into)"
joins = ["left join pg_am as relam_pg_am on pg_class.relam = relam_pg_am.oid"]

[pg_class.columns.relfilenode]
typ = "oid"
ref = ""
desc = "Name of the on-disk file of this relation; zero means this is a “mapped” relation whose disk file name is determined by low-level state"
skip = true

[pg_class.columns.reltablespace]
typ = "oid"
ref = "(references pg_tablespace.oid)"
desc = "The tablespace in which this relation is stored. If zero, the database's default tablespace is implied. Not meaningful if the relation has no on-disk file, except for partitioned tables, where this is the tablespace in which partitions will be created when one is not specified in the creation command."
skip = true

[pg_class.columns.relpages]
typ = "int4"
ref = ""
desc = "Size of the on-disk representation of this table in pages (of size BLCKSZ). This is only an estimate used by the planner. It is updated by VACUUM, ANALYZE, and a few DDL commands such as CREATE INDEX."
skip = true

[pg_class.columns.reltuples]
typ = "float4"
ref = ""
desc = "Number of live rows in the table. This is only an estimate used by the planner. It is updated by VACUUM, ANALYZE, and a few DDL commands such as CREATE INDEX. If the table has never yet been vacuumed or analyzed, reltuples contains -1 indicating that the row count is unknown."
skip = true

[pg_class.columns.relallvisible]
typ = "int4"
ref = ""
desc = "Number of pages that are marked all-visible in the table's visibility map. This is only an estimate used by the planner. It is updated by VACUUM, ANALYZE, and a few DDL commands such as CREATE INDEX."
skip = true

[pg_class.columns.reltoastrelid]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "OID of the TOAST table associated with this table, zero if none. The TOAST table stores large attributes “out of line” in a secondary table."
skip = true

[pg_class.columns.relhasindex]
typ = "bool"
ref = ""
desc = "True if this is a table and it has (or recently had) any indexes"
skip = true

[pg_class.columns.relisshared]
typ = "bool"
ref = ""
desc = "True if this table is shared across all databases in the cluster. Only certain system catalogs (such as pg_database) are shared."
ty = "bool"

[pg_class.columns.relpersistence]
typ = "char"
ref = ""
desc = "p = permanent table/sequence, u = unlogged table/sequence, t = temporary table/sequence"
ty = "PgClassRelpersistence"
exp = "PgClassRelpersistence::pg_from_char(pg_class.relpersistence)"
pgEnum = "'p' => Permanent, 'u' => Unlogged, 't' => Temporary"

[pg_class.columns.relkind]
typ = "char"
ref = ""
desc = "r = ordinary table, i = index, S = sequence, t = TOAST table, v = view, m = materialized view, c = composite type, f = foreign table, p = partitioned table, I = partitioned index"
ty = "PgClassRelkind"
exp = "PgClassRelkind::pg_from_char(pg_class.relkind)"
pgEnum = "'r' => Ordinary, 'i' => Index, 'S' => Sequence, 't' => Toast, 'v' => View, 'm' => MaterializedView, 'c' => CompositeType, 'f' => ForeignTable, 'p' => PartitionedTable, 'I' => PartitionedIndex"

[pg_class.columns.relnatts]
typ = "int2"
ref = ""
desc = "Number of user columns in the relation (system columns not counted). There must be this many corresponding entries in pg_attribute. See also pg_attribute.attnum."
ty = "u16"
exp = "pg_class.relnatts.unsigned_abs()"

[pg_class.columns.relchecks]
typ = "int2"
ref = ""
desc = "Number of CHECK constraints on the table; see pg_constraint catalog"
ty = "u16"
exp = "pg_class.relchecks.unsigned_abs()"

[pg_class.columns.relhasrules]
typ = "bool"
ref = ""
desc = "True if table has (or once had) rules; see pg_rewrite catalog"
skip = true

[pg_class.columns.relhastriggers]
typ = "bool"
ref = ""
desc = "True if table has (or once had) triggers; see pg_trigger catalog"
skip = true

[pg_class.columns.relhassubclass]
typ = "bool"
ref = ""
desc = "True if table or index has (or once had) any inheritance children or partitions"
skip = true

[pg_class.columns.relrowsecurity]
typ = "bool"
ref = ""
desc = "True if table has row-level security enabled; see pg_policy catalog"
ty = "bool"

[pg_class.columns.relforcerowsecurity]
typ = "bool"
ref = ""
desc = "True if row-level security (when enabled) will also apply to table owner; see pg_policy catalog"
ty = "bool"

[pg_class.columns.relispopulated]
typ = "bool"
ref = ""
desc = "True if relation is populated (this is true for all relations other than some materialized views)"
skip = true

[pg_class.columns.relreplident]
typ = "char"
ref = ""
desc = "Columns used to form “replica identity” for rows: d = default (primary key, if any), n = nothing, f = all columns, i = index with indisreplident set (same as nothing if the index used has been dropped)"
ty = "PgClassRelreplident"
exp = "PgClassRelreplident::pg_from_char(pg_class.relreplident)"
pgEnum = "'d' => Default, 'n' => Nothing, 'f' => AllColumns, 'i' => Index "

[pg_class.columns.relispartition]
typ = "bool"
ref = ""
desc = "True if table or index is a partition"
ty = "bool"

[pg_class.columns.relrewrite]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "For new relations being written during a DDL operation that requires a table rewrite, this contains the OID of the original relation; otherwise zero. That state is only visible internally; this field should never contain anything other than zero for a user-visible relation."
skip = true

[pg_class.columns.relfrozenxid]
typ = "xid"
ref = ""
desc = "All transaction IDs before this one have been replaced with a permanent (“frozen”) transaction ID in this table. This is used to track whether the table needs to be vacuumed in order to prevent transaction ID wraparound or to allow pg_xact to be shrunk. Zero (InvalidTransactionId) if the relation is not a table."
skip = true

[pg_class.columns.relminmxid]
typ = "xid"
ref = ""
desc = "All multixact IDs before this one have been replaced by a transaction ID in this table. This is used to track whether the table needs to be vacuumed in order to prevent multixact ID wraparound or to allow pg_multixact to be shrunk. Zero (InvalidMultiXactId) if the relation is not a table."
skip = true

[pg_class.columns.relacl]
typ = "aclitem[]"
ref = ""
desc = "Access privileges; see Section 5.8 for details"
sel = "relacl::text[]"
ty = "Option<Vec<aclitem::TableAclItem>>"
exp = "pg_class.relacl.map(|relacl| relacl.map(|acl| aclitem(acl, &TableGrantParser)).collect())"

[pg_class.columns.reloptions]
typ = "text[]"
ref = ""
desc = "Access-method-specific options, as “keyword=value” strings"
ty = "Option<Vec<Str>>"
exp = "pg_class.reloptions.map(|items| items.map(Into::into).collect())"

[pg_class.columns.relpartbound]
typ = "pg_node_tree"
ref = ""
desc = "If table is a partition (see relispartition), internal representation of the partition bound"
sel = "pg_get_expr(relpartbound, pg_class.oid)"
ty = "Option<Str>"
exp = "pg_class.relpartbound.map(Into::into)"
