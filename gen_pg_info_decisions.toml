ty = "Option<PgConstraintConfupdtype>"
exp = "pg_constraint.confupdtype.map(PgConstraintConfupdtype::pg_from_char)"
pgEnum = "'a' => NoAction, 'r' => Restrict, 'c' => Cascade, 'n' => SetNull, 'd' => SetDefault"

[pg_constraint.columns.confdeltype]
typ = "char"
ref = ""
desc = "Foreign key deletion action code: a = no action, r = restrict, c = cascade, n = set null, d = set default"
sel = "case when pg_constraint.confdeltype = ' ' then null else pg_constraint.confdeltype end"
ty = "Option<PgConstraintConfdeltype>"
exp = "pg_constraint.confdeltype.map(PgConstraintConfdeltype::pg_from_char)"
pgEnum = "'a' => NoAction, 'r' => Restrict, 'c' => Cascade, 'n' => SetNull, 'd' => SetDefault"

[pg_constraint.columns.confmatchtype]
