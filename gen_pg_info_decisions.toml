sel = "pg_constraint.connamespace::regnamespace::text"
ty = "Str"
exp = "pg_constraint.connamespace.into()"

[pg_constraint.columns.contype]
typ = "char"
ref = ""
desc = "c = check constraint, f = foreign key constraint, n = not-null constraint (domains only), p = primary key constraint, u = unique constraint, t = constraint trigger, x = exclusion constraint"
ty = "PgConstraintContype"
exp = "PgConstraintContype::pg_from_char(pg_constraint.contype)"
pgEnum = "'c' => Check, 'f' => ForeignKey, 'n' => DomainNotNull, 'p' => PrimaryKey, 'u' => Unique, 't' => Trigger, 'x' => Exclusion"

[pg_constraint.columns.condeferrable]
typ = "bool"
