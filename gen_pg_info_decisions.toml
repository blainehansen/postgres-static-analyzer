ty = "bool"

[pg_cast.columns.oid]
typ = "oid"
ref = ""
desc = "Row identifier"
skip = true

[pg_cast.columns.castsource]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "OID of the source data type"
sel = "pg_cast.castsource::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_cast.castsource)"

[pg_cast.columns.casttarget]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "OID of the target data type"
sel = "pg_cast.casttarget::regtype::text"
ty = "Qual"
exp = "Qual::parse(pg_cast.casttarget)"

[pg_cast.columns.castfunc]
typ = "oid"
ref = "(references pg_proc.oid)"
desc = "The OID of the function to use to perform this cast. Zero is stored if the cast method doesn't require a function."
sel = "case when pg_cast.castfunc = 0 then null else pg_cast.castfunc::regprocedure::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_cast.castfunc)"

[pg_cast.columns.castcontext]
typ = "char"
ref = ""
desc = "Indicates what contexts the cast can be invoked in. e means only as an explicit cast (using CAST or :: syntax). a means implicitly in assignment to a target column, as well as explicitly. i means implicitly in expressions, as well as the other cases."
ty = "PgCastCastcontext"
exp = "PgCastCastcontext::pg_from_char(pg_cast.castcontext)"
pgEnum = "'e' => Explicit, 'a' => ImplicitAssignment, 'i' => Implicit"

[pg_cast.columns.castmethod]
typ = "char"
ref = ""
desc = "Indicates how the cast is performed. f means that the function specified in the castfunc field is used. i means that the input/output functions are used. b means that the types are binary-coercible, thus no conversion is required."
ty = "PgCastCastmethod"
exp = "PgCastCastmethod::pg_from_char(pg_cast.castmethod)"
pgEnum = "'f' => Castfunc, 'i' => IOFunc, 'b' => BinaryCoercible"

[pg_class]
hashCol = true

[pg_class.columns.oid]
typ = "oid"
ref = ""
desc = "Row identifier"
sel = "pg_class.oid::regclass::text"
ty = "Qual"
exp = "Qual::parse(pg_class.oid)"

[pg_class.columns.relname]
typ = "name"
ref = ""
desc = "Name of the table, index, view, etc."
sel = "pg_class.relname::text"
ty = "Str"
exp = "pg_class.relname.into()"

[pg_class.columns.relnamespace]
typ = "oid"
ref = "(references pg_namespace.oid)"
desc = "The OID of the namespace that contains this relation"
sel = "pg_class.relnamespace::regnamespace::text"
ty = "Str"
exp = "pg_class.relnamespace.into()"
filters = ["relnamespace::regnamespace != 'pg_toast'::regnamespace"]

[pg_class.columns.reltype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "The OID of the data type that corresponds to this table's row type, if any; zero for indexes, sequences, and toast tables, which have no pg_type entry"
sel = "case when pg_class.reltype = 0 then null else pg_class.reltype::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_class.reltype)"

[pg_class.columns.reloftype]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "For typed tables, the OID of the underlying composite type; zero for all other relations"
sel = "case when pg_class.reloftype = 0 then null else pg_class.reloftype::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_class.reloftype)"

[pg_class.columns.relowner]
typ = "oid"
ref = "(references pg_authid.oid)"
desc = "Owner of the relation"
sel = "pg_get_userbyid(pg_class.relowner)::text"
ty = "Str"
exp = "pg_class.relowner.into()"

[pg_class.columns.relam]
typ = "oid"
ref = "(references pg_am.oid)"
desc = "The access method used to access this table or index. Not meaningful if the relation is a sequence or has no on-disk file, except for partitioned tables, where, if set, it takes precedence over default_table_access_method when determining the access method to use for partitions created when one is not specified in the creation command."
sel = "relam_pg_am.amname::text"
ty = "Option<Str>"
exp = "pg_class.relam.map(Into::into)"
joins = ["left join pg_am as relam_pg_am on pg_class.relam = relam_pg_am.oid"]

[pg_class.columns.relfilenode]
typ = "oid"
ref = ""
desc = "Name of the on-disk file of this relation; zero means this is a “mapped” relation whose disk file name is determined by low-level state"
skip = true

[pg_class.columns.reltablespace]
typ = "oid"
ref = "(references pg_tablespace.oid)"
desc = "The tablespace in which this relation is stored. If zero, the database's default tablespace is implied. Not meaningful if the relation has no on-disk file, except for partitioned tables, where this is the tablespace in which partitions will be created when one is not specified in the creation command."
skip = true

[pg_class.columns.relpages]
typ = "int4"
ref = ""
desc = "Size of the on-disk representation of this table in pages (of size BLCKSZ). This is only an estimate used by the planner. It is updated by VACUUM, ANALYZE, and a few DDL commands such as CREATE INDEX."
skip = true

[pg_class.columns.reltuples]
typ = "float4"
ref = ""
desc = "Number of live rows in the table. This is only an estimate used by the planner. It is updated by VACUUM, ANALYZE, and a few DDL commands such as CREATE INDEX. If the table has never yet been vacuumed or analyzed, reltuples contains -1 indicating that the row count is unknown."
skip = true

[pg_class.columns.relallvisible]
typ = "int4"
ref = ""
desc = "Number of pages that are marked all-visible in the table's visibility map. This is only an estimate used by the planner. It is updated by VACUUM, ANALYZE, and a few DDL commands such as CREATE INDEX."
skip = true

[pg_class.columns.reltoastrelid]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "OID of the TOAST table associated with this table, zero if none. The TOAST table stores large attributes “out of line” in a secondary table."
skip = true

[pg_class.columns.relhasindex]
typ = "bool"
ref = ""
desc = "True if this is a table and it has (or recently had) any indexes"
skip = true

[pg_class.columns.relisshared]
typ = "bool"
ref = ""
desc = "True if this table is shared across all databases in the cluster. Only certain system catalogs (such as pg_database) are shared."
ty = "bool"

[pg_class.columns.relpersistence]
typ = "char"
ref = ""
desc = "p = permanent table/sequence, u = unlogged table/sequence, t = temporary table/sequence"
ty = "PgClassRelpersistence"
exp = "PgClassRelpersistence::pg_from_char(pg_class.relpersistence)"
pgEnum = "'p' => Permanent, 'u' => Unlogged, 't' => Temporary"

[pg_class.columns.relkind]
typ = "char"
ref = ""
desc = "r = ordinary table, i = index, S = sequence, t = TOAST table, v = view, m = materialized view, c = composite type, f = foreign table, p = partitioned table, I = partitioned index"
ty = "PgClassRelkind"
exp = "PgClassRelkind::pg_from_char(pg_class.relkind)"
pgEnum = "'r' => Ordinary, 'i' => Index, 'S' => Sequence, 't' => Toast, 'v' => View, 'm' => MaterializedView, 'c' => CompositeType, 'f' => ForeignTable, 'p' => PartitionedTable, 'I' => PartitionedIndex"

[pg_class.columns.relnatts]
typ = "int2"
ref = ""
desc = "Number of user columns in the relation (system columns not counted). There must be this many corresponding entries in pg_attribute. See also pg_attribute.attnum."
ty = "u16"
exp = "pg_class.relnatts.unsigned_abs()"

[pg_class.columns.relchecks]
typ = "int2"
ref = ""
desc = "Number of CHECK constraints on the table; see pg_constraint catalog"
ty = "u16"
exp = "pg_class.relchecks.unsigned_abs()"

[pg_class.columns.relhasrules]
typ = "bool"
ref = ""
desc = "True if table has (or once had) rules; see pg_rewrite catalog"
skip = true

[pg_class.columns.relhastriggers]
typ = "bool"
ref = ""
desc = "True if table has (or once had) triggers; see pg_trigger catalog"
skip = true

[pg_class.columns.relhassubclass]
typ = "bool"
ref = ""
desc = "True if table or index has (or once had) any inheritance children or partitions"
skip = true

[pg_class.columns.relrowsecurity]
typ = "bool"
ref = ""
desc = "True if table has row-level security enabled; see pg_policy catalog"
ty = "bool"

[pg_class.columns.relforcerowsecurity]
typ = "bool"
ref = ""
desc = "True if row-level security (when enabled) will also apply to table owner; see pg_policy catalog"
ty = "bool"

[pg_class.columns.relispopulated]
typ = "bool"
ref = ""
desc = "True if relation is populated (this is true for all relations other than some materialized views)"
skip = true

[pg_class.columns.relreplident]
typ = "char"
ref = ""
desc = "Columns used to form “replica identity” for rows: d = default (primary key, if any), n = nothing, f = all columns, i = index with indisreplident set (same as nothing if the index used has been dropped)"
ty = "PgClassRelreplident"
exp = "PgClassRelreplident::pg_from_char(pg_class.relreplident)"
pgEnum = "'d' => Default, 'n' => Nothing, 'f' => AllColumns, 'i' => Index "

[pg_class.columns.relispartition]
typ = "bool"
ref = ""
desc = "True if table or index is a partition"
ty = "bool"

[pg_class.columns.relrewrite]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "For new relations being written during a DDL operation that requires a table rewrite, this contains the OID of the original relation; otherwise zero. That state is only visible internally; this field should never contain anything other than zero for a user-visible relation."
skip = true

[pg_class.columns.relfrozenxid]
typ = "xid"
ref = ""
desc = "All transaction IDs before this one have been replaced with a permanent (“frozen”) transaction ID in this table. This is used to track whether the table needs to be vacuumed in order to prevent transaction ID wraparound or to allow pg_xact to be shrunk. Zero (InvalidTransactionId) if the relation is not a table."
skip = true

[pg_class.columns.relminmxid]
typ = "xid"
ref = ""
desc = "All multixact IDs before this one have been replaced by a transaction ID in this table. This is used to track whether the table needs to be vacuumed in order to prevent multixact ID wraparound or to allow pg_multixact to be shrunk. Zero (InvalidMultiXactId) if the relation is not a table."
skip = true

[pg_class.columns.relacl]
typ = "aclitem[]"
ref = ""
desc = "Access privileges; see Section 5.8 for details"
sel = "relacl::text[]"
ty = "Option<Vec<aclitem::TableAclItem>>"
exp = "pg_class.relacl.map(|relacl| relacl.map(|acl| aclitem(acl, &TableGrantParser)).collect())"

[pg_class.columns.reloptions]
typ = "text[]"
ref = ""
desc = "Access-method-specific options, as “keyword=value” strings"
ty = "Option<Vec<Str>>"
exp = "pg_class.reloptions.map(|items| items.map(Into::into).collect())"

[pg_class.columns.relpartbound]
