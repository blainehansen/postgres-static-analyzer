exp = "pg_collation.collcollate.map(Into::into)"

[pg_collation.columns.collctype]
typ = "text"
ref = ""
desc = "LC_CTYPE for this collation object. If the provider is not libc, collctype is NULL and colllocale is used instead."
ty = "Option<Str>"
exp = "pg_collation.collctype.map(Into::into)"

[pg_collation.columns.colllocale]
