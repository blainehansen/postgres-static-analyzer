ref = ""
desc = "Is the constraint deferred by default?"
ty = "bool"

[pg_constraint.columns.convalidated]
typ = "bool"
ref = ""
desc = "Has the constraint been validated? Currently, can be false only for foreign keys and CHECK constraints"
ty = "bool"

[pg_constraint.columns.conrelid]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "The table this constraint is on; zero if not a table constraint"
sel = "case when pg_constraint.conrelid = 0 then null else pg_constraint.conrelid::regclass::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_constraint.conrelid)"

[pg_constraint.columns.contypid]
typ = "oid"
ref = "(references pg_type.oid)"
desc = "The domain this constraint is on; zero if not a domain constraint"
sel = "case when pg_constraint.contypid = 0 then null else pg_constraint.contypid::regtype::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_constraint.contypid)"

[pg_constraint.columns.conindid]
typ = "oid"
ref = "(references pg_class.oid)"
desc = "The index supporting this constraint, if it's a unique, primary key, foreign key, or exclusion constraint; else zero"
sel = "case when pg_constraint.conindid = 0 then null else pg_constraint.conindid::regclass::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_constraint.conindid)"

[pg_constraint.columns.conparentid]
