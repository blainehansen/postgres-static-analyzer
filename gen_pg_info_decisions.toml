filters = ["not starts_with(pg_index.indrelid::regclass::text, 'pg_toast')"]
sel = "pg_index.indrelid::regclass::text"
ty = "Qual"
exp = "Qual::parse(pg_index.indrelid)"

[pg_index.columns.indnatts]
typ = "int2"
ref = ""
desc = "The total number of columns in the index (duplicates pg_class.relnatts); this number includes both key and included attributes"
ty = "u16"
exp = "pg_index.indnatts.unsigned_abs()"

[pg_index.columns.indnkeyatts]
typ = "int2"
ref = ""
desc = "The number of key columns in the index, not counting any included columns, which are merely stored and do not participate in the index semantics"
ty = "u16"
exp = "pg_index.indnkeyatts.unsigned_abs()"

[pg_index.columns.indisunique]
typ = "bool"
ref = ""
desc = "If true, this is a unique index"
ty = "bool"

[pg_index.columns.indnullsnotdistinct]
typ = "bool"
ref = ""
desc = "This value is only used for unique indexes. If false, this unique index will consider null values distinct (so the index can contain multiple null values in a column, the default PostgreSQL behavior). If it is true, it will consider null values to be equal (so the index can only contain one null value in a column)."
ty = "bool"

[pg_index.columns.indisprimary]
typ = "bool"
ref = ""
desc = "If true, this index represents the primary key of the table (indisunique should always be true when this is true)"
ty = "bool"

[pg_index.columns.indisexclusion]
typ = "bool"
ref = ""
desc = "If true, this index supports an exclusion constraint"
ty = "bool"

[pg_index.columns.indimmediate]
typ = "bool"
ref = ""
desc = "If true, the uniqueness check is enforced immediately on insertion (irrelevant if indisunique is not true)"
ty = "bool"

[pg_index.columns.indisclustered]
typ = "bool"
ref = ""
desc = "If true, the table was last clustered on this index"
ty = "bool"

[pg_index.columns.indisvalid]
typ = "bool"
ref = ""
desc = "If true, the index is currently valid for queries. False means the index is possibly incomplete: it must still be modified by INSERT/UPDATE operations, but it cannot safely be used for queries. If it is unique, the uniqueness property is not guaranteed true either."
skip = true

[pg_index.columns.indcheckxmin]
typ = "bool"
ref = ""
desc = "If true, queries must not use the index until the xmin of this pg_index row is below their TransactionXmin event horizon, because the table may contain broken HOT chains with incompatible rows that they can see"
skip = true

[pg_index.columns.indisready]
typ = "bool"
ref = ""
desc = "If true, the index is currently ready for inserts. False means the index must be ignored by INSERT/UPDATE operations."
skip = true

[pg_index.columns.indislive]
typ = "bool"
ref = ""
desc = "If false, the index is in process of being dropped, and should be ignored for all purposes (including HOT-safety decisions)"
skip = true

[pg_index.columns.indisreplident]
typ = "bool"
ref = ""
desc = "If true this index has been chosen as “replica identity” using ALTER TABLE ... REPLICA IDENTITY USING INDEX ..."
ty = "bool"

[pg_index.columns.indkey]
typ = "int2vector"
ref = "(references pg_attribute.attnum)"
desc = "This is an array of indnatts values that indicate which table columns this index indexes. For example, a value of 1 3 would mean that the first and the third table columns make up the index entries. Key columns come before non-key (included) columns. A zero in this array indicates that the corresponding index attribute is an expression over the table columns, rather than a simple column reference."
ty = "Vec<u16>"
exp = "pg_index.indkey.map(i16::unsigned_abs).collect()"

[pg_index.columns.indcollation]
typ = "oidvector"
ref = "(references pg_collation.oid)"
desc = "For each column in the index key (indnkeyatts values), this contains the OID of the collation to use for the index, or zero if the column is not of a collatable data type."
sel = "pg_temp.format_pg_collation_oidvector(pg_index.indcollation)"
ty = "Vec<Option<Qual>>"
exp = "pg_index.indcollation.map(Qual::maybe_parse).collect()"

[pg_index.columns.indclass]
typ = "oidvector"
ref = "(references pg_opclass.oid)"
desc = "For each column in the index key (indnkeyatts values), this contains the OID of the operator class to use. See pg_opclass for details."
sel = "pg_temp.format_pg_opclass_oidvector(pg_index.indclass)"
ty = "Vec<Qual>"
exp = "pg_index.indclass.map(Qual::parse).collect()"

[pg_index.columns.indoption]
typ = "int2vector"
ref = ""
desc = "This is an array of indnkeyatts values that store per-column flag bits. The meaning of the bits is defined by the index's access method."
sel = "pg_index.indoption::int2[]"
ty = "Vec<i16>"
exp = "pg_index.indoption.collect()"

[pg_index.columns.indexprs]
typ = "pg_node_tree"
ref = ""
desc = "Expression trees (in nodeToString() representation) for index attributes that are not simple column references. This is a list with one element for each zero entry in indkey. Null if all index attributes are simple references."
sel = "pg_get_expr(pg_index.indexprs, pg_index.indrelid)"
ty = "Option<Str>"
exp = "pg_index.indexprs.map(Into::into)"

[pg_index.columns.indpred]
typ = "pg_node_tree"
ref = ""
desc = "Expression tree (in nodeToString() representation) for partial index predicate. Null if not a partial index."
sel = "pg_get_expr(pg_index.indpred, pg_index.indrelid)"
ty = "Option<Str>"
exp = "pg_index.indpred.map(Into::into)"

