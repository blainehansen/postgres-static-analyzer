[pg_attribute.columns.attcacheoff]
typ = "int4"
ref = ""
desc = "Always -1 in storage, but when loaded into a row descriptor in memory this might be updated to cache the offset of the attribute within the row"
skip = true

[pg_attribute.columns.atttypmod]
typ = "int4"
ref = ""
desc = "atttypmod records type-specific data supplied at table creation time (for example, the maximum length of a varchar column). It is passed to type-specific input functions and length coercion functions. The value will generally be -1 for types that do not need atttypmod."
sel = "case when atttypmod < 0 then null else atttypmod end"
ty = "Option<u32>"
exp = "pg_attribute.atttypmod.map(i32::unsigned_abs)"

[pg_attribute.columns.attndims]
typ = "int2"
ref = ""
desc = "Number of dimensions, if the column is an array type; otherwise 0. (Presently, the number of dimensions of an array is not enforced, so any nonzero value effectively means “it's an array”.)"
ty = "u16"
exp = "pg_attribute.attndims.unsigned_abs()"

[pg_attribute.columns.attbyval]
typ = "bool"
ref = ""
desc = "A copy of pg_type.typbyval of this column's type"
skip = true

[pg_attribute.columns.attalign]
typ = "char"
ref = ""
desc = "A copy of pg_type.typalign of this column's type"
skip = true

[pg_attribute.columns.attstorage]
typ = "char"
ref = ""
desc = "Normally a copy of pg_type.typstorage of this column's type. For TOAST-able data types, this can be altered after column creation to control storage policy."
skip = true

[pg_attribute.columns.attcompression]
typ = "char"
ref = ""
desc = "The current compression method of the column. Typically this is '\\0' to specify use of the current default setting (see default_toast_compression). Otherwise, 'p' selects pglz compression, while 'l' selects LZ4 compression. However, this field is ignored whenever attstorage does not allow compression."
sel = "case when pg_attribute.attcompression = '' then null else pg_attribute.attcompression end"
ty = "Option<PgAttributeAttcompression>"
exp = "pg_attribute.attcompression.map(PgAttributeAttcompression::pg_from_char)"
pgEnum = "'p' => PGLZ, 'l'=> LZ4"

[pg_attribute.columns.attnotnull]
typ = "bool"
ref = ""
desc = "This represents a not-null constraint."
ty = "bool"

[pg_attribute.columns.atthasdef]
typ = "bool"
ref = ""
desc = "This column has a default expression or generation expression, in which case there will be a corresponding entry in the pg_attrdef catalog that actually defines the expression. (Check attgenerated to determine whether this is a default or a generation expression.)"
ty = "bool"

[pg_attribute.columns.atthasmissing]
typ = "bool"
ref = ""
desc = "This column has a value which is used where the column is entirely missing from the row, as happens when a column is added with a non-volatile DEFAULT value after the row is created. The actual value used is stored in the attmissingval column."
skip = true

[pg_attribute.columns.attidentity]
typ = "char"
ref = ""
desc = "If a zero byte (''), then not an identity column. Otherwise, a = generated always, d = generated by default."
sel = "case when pg_attribute.attidentity = '' then null else pg_attribute.attidentity end"
ty = "Option<PgAttributeAttidentity>"
exp = "pg_attribute.attidentity.map(PgAttributeAttidentity::pg_from_char)"
pgEnum = "'a' => GeneratedAlways, 'd' => GenertedByDefault"

[pg_attribute.columns.attgenerated]
typ = "char"
ref = ""
desc = "If a zero byte (''), then not a generated column. Otherwise, s = stored. (Other values might be added in the future.)"
sel = "case when pg_attribute.attgenerated = '' then null else pg_attribute.attgenerated end"
ty = "Option<PgAttributeAttgenerated>"
exp = "pg_attribute.attgenerated.map(PgAttributeAttgenerated::pg_from_char)"
pgEnum = "'s' => Stored"

[pg_attribute.columns.attisdropped]
typ = "bool"
ref = ""
desc = "This column has been dropped and is no longer valid. A dropped column is still physically present in the table, but is ignored by the parser and so cannot be accessed via SQL."
filters = ["not pg_attribute.attisdropped"]
ty = "bool"

[pg_attribute.columns.attislocal]
typ = "bool"
ref = ""
desc = "This column is defined locally in the relation. Note that a column can be locally defined and inherited simultaneously."
ty = "bool"

[pg_attribute.columns.attinhcount]
typ = "int2"
ref = ""
desc = "The number of direct ancestors this column has. A column with a nonzero number of ancestors cannot be dropped nor renamed."
ty = "u16"
exp = "pg_attribute.attinhcount.unsigned_abs()"

[pg_attribute.columns.attcollation]
typ = "oid"
ref = "(references pg_collation.oid)"
desc = "The defined collation of the column, or zero if the column is not of a collatable data type"
sel = "case when pg_attribute.attcollation = 0 then null else pg_attribute.attcollation::regcollation::text end"
ty = "Option<Qual>"
exp = "Qual::maybe_parse(pg_attribute.attcollation)"

[pg_attribute.columns.attstattarget]
typ = "int2"
ref = ""
desc = "attstattarget controls the level of detail of statistics accumulated for this column by ANALYZE. A zero value indicates that no statistics should be collected. A null value says to use the system default statistics target. The exact meaning of positive values is data type-dependent. For scalar data types, attstattarget is both the target number of “most common values” to collect, and the target number of histogram bins to create."
ty = "Option<u16>"
exp = "pg_attribute.attstattarget.map(i16::unsigned_abs)"

[pg_attribute.columns.attacl]
typ = "aclitem[]"
ref = ""
desc = "Column-level access privileges, if any have been granted specifically on this column"
sel = "attacl::text[]"
ty = "Option<Vec<aclitem::TableColumnAclItem>>"
exp = "pg_attribute.attacl.map(|attacl| attacl.map(|acl| aclitem(acl, &TableColumnGrantParser)).collect())"

[pg_attribute.columns.attoptions]
typ = "text[]"
ref = ""
desc = "Attribute-level options, as “keyword=value” strings"
ty = "Option<Vec<Str>>"
exp = "pg_attribute.attoptions.map(|items| items.map(Into::into).collect())"

[pg_attribute.columns.attfdwoptions]
typ = "text[]"
ref = ""
desc = "Attribute-level foreign data wrapper options, as “keyword=value” strings"
ty = "Option<Vec<Str>>"
exp = "pg_attribute.attfdwoptions.map(|items| items.map(Into::into).collect())"

[pg_attribute.columns.attmissingval]
typ = "anyarray"
ref = ""
desc = "This column has a one element array containing the value used when the column is entirely missing from the row, as happens when the column is added with a non-volatile DEFAULT value after the row is created. The value is only used when atthasmissing is true. If there is no value the column is null."
