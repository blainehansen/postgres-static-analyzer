# t = table (including materialized views), i = index.
pg_am.amtype = { ty="PgAmAmtype", exp="PgAmAmtype::pg_from_char(pg_am.amtype)", pgEnum="'t' => Table, 'i' => Index" }

# pg_amop = {}
# Operator purpose, either s for search or o for ordering
pg_amop.amoppurpose = { ty="PgAmopAmoppurpose", exp="PgAmopAmoppurpose::pg_from_char(pg_amop.amoppurpose)", pgEnum="'s' => Search, 'o' => Ordering" }

pg_amproc = {}

# pg_attrdef = {}
pg_attrdef.adnum = { filters=["pg_attrdef.adnum > 0"] }
pg_attrdef.adbin = { sel="pg_get_expr(pg_attrdef.adbin, pg_attrdef.adrelid)", ty="Str", exp="pg_attrdef.adbin.into()" }

# pg_attribute = {}
pg_attribute.attrelid = { filters=["not starts_with(pg_attribute.attrelid::regclass::text, 'pg_toast')"] }
pg_attribute.attnum = { filters=["pg_attribute.attnum > 0"] }
pg_attribute.attisdropped = { filters=["not pg_attribute.attisdropped"] }
pg_attribute.attcacheoff = 'skip'
pg_attribute.atthasmissing = 'skip'
pg_attribute.attmissingval = 'skip'
# The current compression method of the column. Typically this is '\0' to specify use of the current default setting (see default_toast_compression). Otherwise, 'p' selects pglz compression, while 'l' selects LZ4 compression. However, this field is ignored whenever attstorage does not allow compression.
pg_attribute.attcompression = { sel="case when pg_attribute.attcompression = '' then null else pg_attribute.attcompression end", ty="Option<PgAttributeAttcompression>", exp="pg_attribute.attcompression.map(PgAttributeAttcompression::pg_from_char)", pgEnum="'p' => PGLZ, 'l'=> LZ4" }
# If a zero byte (''), then not an identity column. Otherwise, a = generated always, d = generated by default.
pg_attribute.attidentity = { sel="case when pg_attribute.attidentity = '' then null else pg_attribute.attidentity end", ty="Option<PgAttributeAttidentity>", exp="pg_attribute.attidentity.map(PgAttributeAttidentity::pg_from_char)", pgEnum="'a' => GeneratedAlways, 'd' => GenertedByDefault" }
# If a zero byte (''), then not a generated column. Otherwise, s = stored. (Other values might be added in the future.)
pg_attribute.attgenerated = { sel="case when pg_attribute.attgenerated = '' then null else pg_attribute.attgenerated end", ty="Option<PgAttributeAttgenerated>", exp="pg_attribute.attgenerated.map(PgAttributeAttgenerated::pg_from_char)", pgEnum="'s' => Stored" }


