[workspace]
members = [
	".",
	"temp_container_utils",
	"reflect_crate",
]

[workspace.dependencies]
futures = "0.3"
thiserror = "2"
tokio = { version = "1", features = ["full", "rt"] }
tokio-postgres = { version = "0.7" }
rand = "0.9"
rand_distr = "0.5"
chrono = { version = "0.4", default-features = false, features = ["alloc", "std", "alloc", "clock", "now", "serde"] }
hashbrown = "0.16"
pg_query = "6.1"
itertools = "0.14.0"
anyhow = "1"


[package]
name = "postgres-static-analyzer"
version = "0.1.0"
edition = "2024"

[dependencies]
reflect_crate = { path = "./reflect_crate" }
hashbrown.workspace = true
tokio = { workspace = true, features = ["full", "rt"] }
chrono = { workspace = true, default-features = false, features = ["alloc", "std", "alloc", "clock", "now", "serde"] }
thiserror.workspace = true
pg_query.workspace = true
itertools.workspace = true


[dev-dependencies]
anyhow.workspace = true
temp_container_utils = { path = "./temp_container_utils" }
