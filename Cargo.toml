[workspace]
members = [
	".",
	"temp_container_utils",
	"reflect_crate",
]

[workspace.dependencies]
futures = "0.3"
thiserror = "2"
tokio = { version = "1", features = ["full", "rt"] }
tokio-postgres = { version = "0.7" }
rand = "0.9"
rand_distr = "0.5"
chrono = { version = "0.4", default-features = false, features = ["alloc", "std", "alloc", "clock", "now", "serde"] }
hashbrown = "0.16"
pg_query = "6.1"
smol_str = { version = "0.3", features = ["serde"] }
itertools = "0.14.0"
anyhow = "1"
nom = "8"
paste = "1"
insta = { version = "1.46", default-features = false, features = ["colors", "ron"] }
serde = { version = "1", features = ["derive"] }

[package]
name = "postgres-static-analyzer"
version = "0.1.0"
edition = "2024"

[dependencies]
reflect_crate = { path = "./reflect_crate" }
hashbrown.workspace = true
tokio = { workspace = true, features = ["full", "rt"] }
chrono = { workspace = true, default-features = false, features = ["alloc", "std", "alloc", "clock", "now", "serde"] }
# thiserror.workspace = true
pg_query.workspace = true
smol_str.workspace = true
itertools.workspace = true
nom.workspace = true
paste.workspace = true
futures.workspace = true
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
anyhow.workspace = true
insta = { workspace = true, default-features = false, features = ["colors", "ron"] }
temp_container_utils = { path = "./temp_container_utils" }

[profile.dev.package.insta]
opt-level = 3
[profile.dev.package.similar]
opt-level = 3
